<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaintainIQ — Sign in</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <span class="rivet tl"></span><span class="rivet tr"></span>
    <span class="rivet bl"></span><span class="rivet br"></span>

    <div class="auth-header">
      <div class="brand-mark-lg">⚙</div>
      <h1 style="font-size:20px;">MaintainIQ</h1>
      <p style="margin:0;">Scan. Report. Diagnose. Maintain.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@organization.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      <p class="small-note text-center mt-16">Public users don't need an account — scan an asset's QR code to report an issue directly.</p>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display:none;">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Ali Raza" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@organization.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Minimum 6 characters" minlength="6" required>
      </div>
      <div class="field">
        <label>Role</label>
        <select id="signup-role">
          <option value="technician">Technician</option>
          <option id="Administrator" value="admin">Administrator</option>
        </select>
        <p class="hint">Pick Administrator only for the account that will manage assets &amp; assignments.</p>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="signup-btn">Create Account</button>
    </form>
  </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script>
(async () => {
  let Administrator = document.getElementById('Administrator');
  console.log(Administrator);
  
  // Supabase query ko try-catch mein rakhein taake exact error handle ho sake
  try {
    const { data : ischeck, error } = await sb
      .from('profiles')
      .select() 
      .eq('role' , 'admin')

    if (error) {
      console.error("Supabase Error:", error.message);
    } else {
      console.log("Admin Data:", ischeck);
      ischeck[0].role === 'admin' ? Administrator.remove() : Administrator
    }
  } catch (err) {
    console.error("System Error:", err);
  }
})();

function switchTab(tab) {
  document.getElementById("tab-login").classList.toggle("active", tab === "login");
  document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
  document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
  document.getElementById("signup-form").style.display = tab === "signup" ? "block" : "none";
}

// Redirect if already logged in
(async () => {
  const profile = await getCurrentProfile();
  if (profile) {
    window.location.href = profile.role === "admin" ? "admin-dashboard.html" : "technician-dashboard.html";
  }
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("login-btn");
  btn.disabled = true; btn.textContent = "Signing in...";
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    toast(error.message, "error");
    btn.disabled = false; btn.textContent = "Sign In";
    return;
  }
  const profile = await getCurrentProfile();
  window.location.href = profile?.role === "admin" ? "admin-dashboard.html" : "technician-dashboard.html";
});

document.getElementById("signup-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("signup-btn");
  btn.disabled = true; btn.textContent = "Creating account...";

  const full_name = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  const role = document.getElementById("signup-role").value;

  const { data : ischeck , error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name, role } }
  
  });

  if (error) {
    toast(error.message, "error");
    btn.disabled = false; btn.textContent = "Create Account";
    return;
  }
  
  console.log(ischeck);
  

  toast("Account created! Signing you in...", "success");
  const { error: loginErr } = await sb.auth.signInWithPassword({ email, password });
  if (loginErr) {
    toast("Account created — please sign in.", "success");
    switchTab("login");
    btn.disabled = false; btn.textContent = "Create Account";
    return;
  }
  window.location.href = role === "admin" ? "admin-dashboard.html" : "technician-dashboard.html";
});
</script>
</body>
</html>
