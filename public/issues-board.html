<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaintainIQ — Issues Board</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-mark">⚙</span> MaintainIQ</div>
  <div class="topbar-actions">
    <a href="admin-dashboard.html" class="btn btn-ghost btn-sm">← Assets</a>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <span class="eyebrow">Administrator</span>
      <h1>Issues Board</h1>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="Search title, issue #, asset...">
    <select id="filter-status"><option value="">All Statuses</option></select>
    <select id="filter-priority"><option value="">All Priorities</option></select>
    <div class="spacer"></div>
  </div>

  <div class="list" id="issue-list"><div class="loading-state">Loading issues...</div></div>
</div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal">
    <div class="modal-head">
      <h2>Assign Technician</h2>
      <button class="modal-close" onclick="document.getElementById('assign-modal').classList.remove('open')">×</button>
    </div>
    <div class="field">
      <label>Issue</label>
      <p id="assign-issue-title" style="color:var(--text); font-weight:600;"></p>
    </div>
    <div class="field">
      <label>Technician</label>
      <select id="technician-select"></select>
    </div>
    <button class="btn btn-primary btn-block" onclick="confirmAssign()">Assign</button>
  </div>
</div>
<script src="./config.js"></script>
<script  src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script>
let currentProfile = null;
let allIssues = [];
let assetLookup = {};
let technicians = [];
let assignTargetIssueId = null;
console.log('ashash');

(async function init() {
  currentProfile = await requireAuth(["admin"]);
  if (!currentProfile) return;

  document.getElementById("filter-status").innerHTML =
    `<option value="">All Statuses</option>` + ISSUE_STATUSES.map(s => `<option value="${s}">${s}</option>`).join("");
  document.getElementById("filter-priority").innerHTML =
    `<option value="">All Priorities</option>` + PRIORITIES.map(s => `<option value="${s}">${s}</option>`).join("");

  const { data: techs } = await sb.from('profiles')
  .select()
  .eq('role' , 'technician')
  console.log(techs);
  
  technicians = techs || [];
  document.getElementById("technician-select").innerHTML =
    technicians.map(t => `<option value="${t.id}">${t.full_name}</option>`).join("") || `<option value="">No technicians registered yet</option>`;

  await loadIssues();

  document.getElementById("search-input").addEventListener("input", renderList);
  document.getElementById("filter-status").addEventListener("change", renderList);
  document.getElementById("filter-priority").addEventListener("change", renderList);
})();

async function loadIssues() {
  const { data: issues, error } = await sb.from("issues").select("*").order("created_at", { ascending: false });
  if (error) { toast("Failed to load issues", "error"); return; }
  allIssues = issues || [];

  const assetIds = [...new Set(allIssues.map(i => i.asset_id))];
  if (assetIds.length) {
    const { data: assets } = await sb.from("assets").select("id, name, asset_code").in("id", assetIds);
    (assets || []).forEach(a => assetLookup[a.id] = a);
  }
  renderList();
}

function renderList() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const statusF = document.getElementById("filter-status").value;
  const prioF = document.getElementById("filter-priority").value;

  const filtered = allIssues.filter(i => {
    const asset = assetLookup[i.asset_id] || {};
    const matchQ = !q || i.title.toLowerCase().includes(q) || i.issue_number.toLowerCase().includes(q) || (asset.name || "").toLowerCase().includes(q);
    const matchStatus = !statusF || i.status === statusF;
    const matchPrio = !prioF || i.priority === prioF;
    return matchQ && matchStatus && matchPrio;
  });

  const list = document.getElementById("issue-list");
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No issues match your filters.</div>`;
    return;
  }

  list.innerHTML = filtered.map(i => {
    const asset = assetLookup[i.asset_id] || {};
    const tech = technicians.find(t => t.id === i.assigned_technician);
    return `
    <div class="list-row">
      <div class="main" onclick="window.location.href='issue-detail.html?id=${i.id}'" style="cursor:pointer;">
        <div class="title">${escapeHtml(i.title)}</div>
        <div class="sub">${asset.asset_code || ""} · ${escapeHtml(asset.name || "Unknown asset")} · ${i.issue_number} · ${tech ? "Assigned to " + tech.full_name : "Unassigned"}</div>
      </div>
      <div class="side">
        <span class="${priorityClass(i.priority)}">${i.priority}</span>
        <span class="${badgeClass('badge', i.status)}">${i.status}</span>
        <button class="btn btn-ghost btn-sm" onclick="openAssign('${i.id}', '${escapeHtml(i.title).replace(/'/g, "\\'")}')">Assign</button>
      </div>
    </div>`;
  }).join("");
}

function openAssign(issueId, title) {
  assignTargetIssueId = issueId;
  document.getElementById("assign-issue-title").textContent = title;
  document.getElementById("assign-modal").classList.add("open");
}

async function confirmAssign() {
  const techId = document.getElementById("technician-select").value;
  if (!techId) { toast("No technician selected", "error"); return; }

  const issue = allIssues.find(i => i.id === assignTargetIssueId);
  const tech = technicians.find(t => t.id === techId);

  const { error } = await sb.from("issues").update({
    assigned_technician: techId,
    status: issue.status === "Reported" ? "Assigned" : issue.status,
    updated_at: new Date().toISOString(),
  }).eq("id", assignTargetIssueId);

  if (error) { toast(error.message, "error"); return; }

  await logHistory({
    asset_id: issue.asset_id, issue_id: issue.id, actor_name: currentProfile.full_name, actor_id: currentProfile.id,
    action: `Issue assigned to ${tech.full_name}`, details: issue.issue_number,
  });

  toast("Technician assigned");
  document.getElementById("assign-modal").classList.remove("open");
  await loadIssues();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}
</script>
</body>
</html>
